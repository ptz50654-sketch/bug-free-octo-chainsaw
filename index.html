<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妹妹的小小世界～</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #ffe4e1, #fff0f5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ff69b4;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(255, 105, 180, 0.2);
            text-align: center;
            max-width: 320px;
            border: 3px solid #ffb6c1;
        }
        h1 {
            font-size: 28px;
            margin: 10px 0;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #db7093;
        }
        .heart {
            font-size: 50px;
            animation: beat 1.2s infinite;
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">💖</div>
        <h1>嗨～我是妹妹！</h1>
        <p>今天也要开开心心哦～<br>
           喜欢粉粉的颜色和可爱的事物～<br>
           欢迎来到我的小小世界呀！❤️</p>
        <p>～ 姐姐帮你做的第一个网页 ～</p>
    </div>
</body>
</html>
