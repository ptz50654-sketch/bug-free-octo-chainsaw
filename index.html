<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属涩值测算器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{
            background: linear-gradient(120deg,#ffd6e0,#ffc8dd,#ffafcc);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .card{
            background:#fff;
            padding:30px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(255,120,160,0.2);
            border:2px solid #ffb6c1;
            width:100%;
            max-width:450px;
        }
        h1{
            text-align:center;
            color:#ff6b9d;
            margin-bottom:25px;
            font-size:24px;
        }
        .input-box{
            width:100%;
            padding:12px 15px;
            border:2px solid #ffc0cb;
            border-radius:12px;
            margin-bottom:15px;
            font-size:16px;
            outline:none;
        }
        .input-box:focus{border-color:#ff6b9d}
        button{
            width:100%;
            padding:14px;
            background:linear-gradient(90deg,#ff6b9d,#c8b6ff);
            color:white;
            border:none;
            border-radius:12px;
            font-size:17px;
            font-weight:bold;
            margin:10px 0 20px;
            cursor:pointer;
        }
        .result{
            text-align:center;
            font-size:20px;
            color:#444;
            font-weight:bold;
            min-height:40px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>✨专属涩值缘分测算✨</h1>
    <input type="text" class="input-box" id="name" placeholder="请输入你的名字（不可输入：爱吃山竹口牙❤️）">
    <input type="number" class="input-box" id="age" placeholder="请输入你的年龄">
    <input type="text" class="input-box" id="hobby" placeholder="请输入你的爱好">
    <button onclick="calcSeValue()">一键测算我的涩值</button>
    <div class="result" id="show"></div>
</div>

<script>
// 核心涩值算法+违禁词屏蔽
function calcSeValue(){
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let hobby = document.getElementById("hobby").value;

    // 名字违禁词拦截判定
    const banWord = "爱吃山竹口牙❤️";
    if(name.includes(banWord)){
        document.getElementById("show").innerText="不可以输入爱吃山竹口牙❤️哟~🥺";
        return;
    }
    
    if(!name||!age||!hobby){
        document.getElementById("show").innerText="请把三个内容都填写完整哦🥺";
        return;
    }

    // 稳定专属哈希算法
    let hash = 0;
    for(let i=0;i<name.length;i++) hash += name.charCodeAt(i);
    for(let i=0;i<hobby.length;i++) hash += hobby.charCodeAt(i);
    hash += Number(age)*13;
    let seNum = hash % 101;

    let tip = "";
    if(seNum<20) tip="清纯小白花💗";
    else if(seNum<40) tip="温柔腼腆型🥰";
    else if(seNum<60) tip="纯情又心动💓";
    else if(seNum<80) tip="有点小撩人🥺";
    else tip="顶级涩气天花板💋";

    document.getElementById("show").innerText=`你的专属涩值：${seNum}分 | ${tip}`;
}
</script>
</body>
</html>
