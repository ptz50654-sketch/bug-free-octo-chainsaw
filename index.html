<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妹妹的涩值测算</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Microsoft YaHei",sans-serif;
        }
        body{
            background:linear-gradient(135deg,#ffe4e1,#fff0f5);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .card{
            background:white;
            padding:25px 20px;
            border-radius:25px;
            box-shadow:0 15px 30px rgba(255,105,180,0.2);
            max-width:360px;
            width:100%;
            border:4px solid #ffb6c1;
            text-align:center;
            position:relative;
            z-index:2;
        }
        h1{
            font-size:19px;
            color:#ff1493;
            margin-bottom:18px;
        }
        input,button{
            width:100%;
            padding:10px 12px;
            margin-bottom:10px;
            border:2px solid #ffb6c1;
            border-radius:12px;
            font-size:14px;
            outline:none;
        }
        input:focus{
            border-color:#ff69b4;
        }
        button{
            background:#ff69b4;
            color:white;
            font-weight:bold;
            border:none;
            cursor:pointer;
        }
        button:active{
            transform:scale(0.97);
        }
        .upload-btn{
            display:inline-block;
            width:100%;
            padding:10px 12px;
            margin-bottom:10px;
            background:#ffb6c1;
            color:#ff1493;
            border-radius:12px;
            font-size:14px;
            font-weight:bold;
            cursor:pointer;
            border:2px solid #ff69b4;
        }
        #avatar{
            display:none;
        }
        #preview{
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:10px;
            margin:8px auto;
            display:none;
            border:2px solid #ffb6c1;
        }
        .result{
            margin-top:15px;
            font-size:15px;
            color:#ff1493;
            font-weight:bold;
            line-height:1.5;
        }
        .heart{
            position:fixed;
            z-index:999;
            pointer-events:none;
            animation:heart 1s linear forwards;
        }
        @keyframes heart{
            0%{opacity:1;transform:translate(0,0);}
            100%{opacity:0;transform:translate(0,-100px);}
        }
    </style>
</head>
<body>

<div class="card">
    <h1>✨妹妹专属涩值测算✨</h1>

    <!-- 👇这里直接显示违禁词提示 -->
    <input type="text" id="name" placeholder="输入你的名字（禁止：爱吃山竹口牙❤️）">
    <input type="number" id="age" placeholder="输入你的年龄">
    <input type="text" id="hobby" placeholder="输入你的爱好">
    
    <label class="upload-btn" for="avatar">📷 从相册选择图片</label>
    <input type="file" id="avatar" accept="image/*" onchange="previewImg()">
    
    <img id="preview">
    <button onclick="check()">开始测算涩值</button>
    <div class="result" id="res"></div>
</div>

<script>
// 点击飘爱心
document.addEventListener('click',function(e){
    let heart = document.createElement('div');
    heart.innerHTML = '💖';
    heart.className = 'heart';
    heart.style.left = e.clientX - 10 + 'px';
    heart.style.top = e.clientY - 15 + 'px';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),1000);
});

// 图片预览
function previewImg(){
    let file = document.getElementById('avatar').files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(e){
        let img = document.getElementById('preview');
        img.src = e.target.result;
        img.style.display = 'block';
    }
    reader.readAsDataURL(file);
}

// 测算 + 违禁词检测
function check(){
    let name = document.getElementById('name').value.trim();
    let age = document.getElementById('age').value.trim();
    let hobby = document.getElementById('hobby').value.trim();
    let hasImg = document.getElementById('avatar').files.length>0;
    
    let ban = "爱吃山竹口牙❤️";
    if(name.includes(ban)){
        document.getElementById('res').innerText = "不可以输入爱吃山竹口牙❤️哟～";
        return;
    }

    if(!name || !age || !hobby){
        document.getElementById('res').innerText = "请把信息填完整哦🥺";
        return;
    }

    let base = 0;
    for(let i=0;i<name.length;i++) base += name.charCodeAt(i);
    base += Number(age)*5;
    base += hobby.length*8;
    if(hasImg) base +=25;

    let se = Math.abs(base%100);
    let text = "";

    if(se<20) text="💗 清纯小白纸";
    else if(se<40) text="🥰 有点涩涩但不多";
    else if(se<60) text="💓 涩涩小高手";
    else if(se<80) text="🥺 涩涩的顶级专家";
    else text="😍😍 顶级涩值天花板";

    document.getElementById('res').innerText = `你的涩值：${se}分\n${text}`;
}
</script>
</body>
</html>
