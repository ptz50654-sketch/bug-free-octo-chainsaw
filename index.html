<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属涩值精准测算器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{
            background: linear-gradient(120deg,#ffd6e0,#ffc8dd,#ffafcc);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .card{
            background:#fff;
            padding:25px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(255,120,160,0.2);
            border:2px solid #ffb6c1;
            width:100%;
            max-width:420px;
        }
        h1{
            text-align:center;
            color:#ff6b9d;
            margin-bottom:20px;
            font-size:20px;
        }
        .input-box,.select-box{
            width:100%;
            padding:10px 13px;
            border:2px solid #ffc0cb;
            border-radius:12px;
            margin-bottom:12px;
            font-size:14px;
            outline:none;
        }
        .input-box:focus,.select-box:focus{border-color:#ff6b9d}
        button{
            width:100%;
            padding:12px;
            background:linear-gradient(90deg,#ff6b9d,#c8b6ff);
            color:white;
            border:none;
            border-radius:12px;
            font-size:15px;
            font-weight:bold;
            margin:8px 0 18px;
            cursor:pointer;
        }
        .result{
            text-align:center;
            font-size:16px;
            color:#444;
            font-weight:bold;
            min-height:35px;
            line-height:1.5;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>✨专属精准涩值缘分测算✨</h1>
    <input type="text" class="input-box" id="name" placeholder="你的名字（不可输入：爱吃山竹口牙❤️）">
    <input type="number" class="input-box" id="age" placeholder="你的年龄">
    <input type="text" class="input-box" id="hobby" placeholder="你的兴趣爱好">
    <select class="select-box" id="picType">
        <option value="0">请选择你喜欢的图片风格</option>
        <option value="1">清纯治愈风景/小动物</option>
        <option value="2">可爱二次元萌系插画</option>
        <option value="3">氛围感氛围感人像</option>
        <option value="4">偏性感氛围感写真</option>
    </select>
    <button onclick="calcSeValue()">一键精准测算涩值</button>
    <div class="result" id="show"></div>
</div>

<script>
// 四重维度深度智能涩值算法+违禁词风控
function calcSeValue(){
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let hobby = document.getElementById("hobby").value;
    let picTag = Number(document.getElementById("picType").value);

    // 违禁词强制拦截
    const banWord = "爱吃山竹口牙❤️";
    if(name.includes(banWord)){
        document.getElementById("show").innerText="不可以输入爱吃山竹口牙❤️哟~🥺";
        return;
    }
    // 空内容校验
    if(!name||!age||!hobby||picTag==0){
        document.getElementById("show").innerText="请把4项内容全部填写完整哦🥺";
        return;
    }

    // 名字字符熵加密
    let nameHash = 0;
    for(let i=0;i<name.length;i++) nameHash += name.charCodeAt(i) * (i+1);
    // 爱好涩感权重识别
    let hobbyHash = 0;
    for(let i=0;i<hobby.length;i++) hobbyHash += hobby.charCodeAt(i);
    // 年龄成熟度加权
    let ageScore = Number(age) * 9;
    // 图片风格涩感底层标签权重（算法核心区分清纯/涩感）
    let picScore = picTag * 18;

    // 四维融合精准算法，0-100线性分布
    let total = nameHash + hobbyHash + ageScore + picScore;
    let seNum = Math.min(total % 101, 99);

    // 精细化涩感分级，区分度拉满
    let tip = "";
    if(seNum<15) tip="白纸一张💗";
    else if(seNum<32) tip="干净乖小孩🥰";
    else if(seNum<50) tip="懂一点点的小乖💌";
    else if(seNum<68) tip="瑟瑟高手💓";
    else if(seNum<85) tip="你是精通瑟瑟的专家😍";
    else tip="顶级天生涩感天花板😍😍😍🥰";

    document.getElementById("show").innerText=`你的专属精准涩值：${seNum}分 | ${tip}`;
}
</script>
</body>
</html>
